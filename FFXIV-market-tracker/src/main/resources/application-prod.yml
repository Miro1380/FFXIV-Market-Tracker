spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate   # or none — don't use create-drop in prod
  main:
    web-application-type: servlet

server:
  port: ${PORT:8080}   # Railway injects PORT dynamically